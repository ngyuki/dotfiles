[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [
    "~/.claude/wsl-toast.sh",
    "code --wait",
    "docker compose down",
    "docker compose ps",
    "docker compose run",
    "gh issue view",
    "git branch --list",
    "git branch --show-current",
    "git diff",
    "git fetch",
    "git log",
    "git rev-parse",
    "git show",
    "git status",
    "grep",
    "id",
    "ls",
]

[[rule]]
toolName = "web_fetch"
decision = "allow"
priority = 100

[[rule]]
toolName = "activate_skill"
decision = "allow"
priority = 100
