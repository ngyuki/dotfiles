[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [
    "~/.claude/wsl-toast.sh",
    "gh issue view",
    "git branch --list",
    "git diff",
    "git log",
    "git show",
    "git status",
    "grep",
    "ls",
]

[[rule]]
toolName = "web_fetch"
decision = "allow"
priority = 100

[[rule]]
toolName = "activate_skill"
decision = "allow"
priority = 100
argsPattern = '"name":"code-review"'
